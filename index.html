<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUNO Timeline</title>
    <meta
      name="description"
      content="&#21311;&#21517;&#12391;Suno&#12398;&#20849;&#26377;&#12522;&#12531;&#12463;&#12434;&#27969;&#12375;&#12289;&#20877;&#29983;&#12392;&#12356;&#12356;&#12397;&#12384;&#12369;&#12395;&#38598;&#20013;&#12377;&#12427;&#38745;&#12363;&#12394;&#12479;&#12452;&#12512;&#12521;&#12452;&#12531;&#12290;"
    />
    <link rel="icon" type="image/png" sizes="256x256" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" href="./assets/favicon.png" />
    <link rel="preconnect" href="https://suno.com" />
    <link rel="preconnect" href="https://cdn2.suno.ai" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="hero__eyebrow">Anonymous music stream</p>
        <h1>SUNO Timeline 24</h1>
        <p class="hero__lead">
          &#12381;&#12428;&#12399;24&#26178;&#38291;&#12391;&#28040;&#12360;&#12427;&#39764;&#27861;&#12290;
        </p>
      </header>

      <main class="layout">
        <section class="composer" aria-labelledby="composer-title">
          <div class="composer__copy">
            <p class="section-label">Post a track</p>
            <h2 id="composer-title">
              Suno&#12398;&#20849;&#26377;&#12522;&#12531;&#12463;&#12434;&#36028;&#12427;
            </h2>
            <p>
              &#25237;&#31295;&#12373;&#12428;&#12427;&#12398;&#12399;&#22475;&#12417;&#36796;&#12415;&#12503;&#12524;&#12452;&#12516;&#12540;&#12384;&#12369;&#12290;&#35504;&#12364;&#36028;&#12387;&#12383;&#12363;&#12399;&#12289;&#12393;&#12371;&#12395;&#12418;&#20986;&#12414;&#12379;&#12435;&#12290;
            </p>
            <p class="composer__rule">
              &#26354;&#12399;&#12479;&#12452;&#12512;&#12521;&#12452;&#12531;&#12363;&#12425;24&#26178;&#38291;&#12391;&#28040;&#12360;&#12414;&#12377;&#12290;
            </p>
            <p class="composer__rule">
              タイムラインはメンテナンスで予告なく初期化されることがあります。
            </p>
          </div>

          <form id="track-form" class="composer__form">
            <label class="sr-only" for="track-url">
              Suno&#20849;&#26377;&#12522;&#12531;&#12463;
            </label>
            <input
              id="track-url"
              name="track-url"
              type="url"
              inputmode="url"
              autocomplete="off"
              placeholder="https://suno.com/song/..."
              maxlength="2048"
              required
            />
            <button type="submit">
              &#25237;&#31295;&#12377;&#12427;
            </button>
          </form>

          <p id="form-feedback" class="composer__feedback" aria-live="polite"></p>
        </section>

        <section class="timeline" aria-labelledby="timeline-title">
          <div class="timeline__header">
            <p class="section-label">Timeline</p>
            <h2 id="timeline-title">
              &#27969;&#12428;&#12390;&#12356;&#12427;&#26354;
            </h2>
            <p class="timeline__rule">
              &#26354;&#12399;&#12479;&#12452;&#12512;&#12521;&#12452;&#12531;&#12363;&#12425;24&#26178;&#38291;&#12391;&#28040;&#12360;&#12414;&#12377;&#12290;
            </p>
            <p class="timeline__rule">
              タイムラインはメンテナンスで予告なく初期化されることがあります。
            </p>
          </div>

          <div id="empty-state" class="empty-state" hidden>
            <p>
              &#12414;&#12384;&#26354;&#12399;&#12354;&#12426;&#12414;&#12379;&#12435;&#12290;&#26368;&#21021;&#12398;1&#26354;&#12434;&#27969;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;
            </p>
          </div>

          <div id="timeline-list" class="timeline__list" aria-live="polite"></div>
        </section>
      </main>

      <section id="player-dock" class="player-dock" hidden aria-live="polite">
        <div class="player-dock__meta">
          <p id="player-dock-artist" class="player-dock__artist"></p>
        </div>
        <div class="player-dock__frame">
          <iframe
            id="player-dock-iframe"
            loading="eager"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="autoplay"
            title="Suno bottom player"
          ></iframe>
        </div>
      </section>
    </div>

    <template id="track-template">
      <article class="track-card">
        <div class="track-card__meta">
          <p class="track-card__stamp"></p>
          <a class="track-card__link" target="_blank" rel="noreferrer">OPEN IN SUNO</a>
        </div>

        <div class="track-card__summary">
          <img class="track-card__art" alt="" />
          <div class="track-card__copy">
            <h3 class="track-card__title"></h3>
            <p class="track-card__artist"></p>
          </div>
        </div>

        <div class="track-card__player-shell">
          <button class="track-card__play-button" type="button">
            この曲を再生
          </button>
        </div>

        <div class="track-card__meter">
          <div class="track-card__meter-bar">
            <span class="track-card__meter-fill"></span>
          </div>
          <p class="track-card__meter-label"></p>
        </div>

        <div class="track-card__actions">
          <button class="like-button" type="button" aria-pressed="false">
            <span class="like-button__icon" aria-hidden="true">&#9825;</span>
            <span class="like-button__label">Like</span>
            <span class="like-button__count">0</span>
          </button>
          <button class="report-button" type="button" aria-pressed="false">
            <span class="report-button__icon" aria-hidden="true">&#9888;</span>
            <span class="report-button__label">通報</span>
          </button>
          <div class="track-stat" aria-label="Play count">
            <span class="track-stat__icon" aria-hidden="true">&#9654;</span>
            <span class="track-stat__label">Play</span>
            <span class="track-stat__count">0</span>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
